name: CI - cross-platform build

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.20', '1.21']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          mkdir -p build artifacts
          go build -ldflags "-X main.Version=${{ github.ref_name }}" -o build/uv-helper-${{ runner.os }}-${{ matrix.go }} uv-helper.go
          tar -C build -czf ../artifacts/uv-helper-${{ matrix.go }}-${{ runner.os | toLower }}.tar.gz uv-helper-${{ runner.os }}-${{ matrix.go }}
        shell: bash

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Path build -Force | Out-Null
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          go build -ldflags "-X main.Version=${{ github.ref_name }}" -o build\uv-helper-windows-${{ matrix.go }}.exe uv-helper.go
          Compress-Archive -Path build\uv-helper-windows-${{ matrix.go }}.exe -DestinationPath artifacts\uv-helper-${{ matrix.go }}-windows.zip -Force
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uv-helper-artifacts-${{ matrix.os }}-${{ matrix.go }}
          path: artifacts/

  release:
    name: Create Release and upload artifacts
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          echo "Downloaded files:" && ls -la artifacts || true

      - name: Create GitHub Release and upload artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/**
