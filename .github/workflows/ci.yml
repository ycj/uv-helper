name: CI - cross-platform build

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.20', '1.21']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}

      - name: Build uv-helper
        run: |
          go build -ldflags "-X main.Version=${{ github.ref_name }}" -o uv-helper-${{ matrix.os }}-${{ matrix.go }}.exe uv-helper.go

      - name: Archive build
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: uv-helper-${{ matrix.os }}-${{ matrix.go }}
          path: uv-helper-${{ matrix.os }}-${{ matrix.go }}.exe

      - name: Archive build (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: uv-helper-${{ matrix.os }}-${{ matrix.go }}
          path: uv-helper-${{ matrix.os }}-${{ matrix.go }}
